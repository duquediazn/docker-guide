# Iniciar un bloque de servidor que escuche en el puerto 80 (puerto HTTP por defecto)
server {
    listen 80;

    # Establecer el nombre del servidor (no es necesario para desarrollo local, pero se incluye por claridad)
    server_name localhost;

    # Definir el directorio raíz desde el que se servirán los archivos estáticos
    root /usr/share/nginx/html;

    # Especificar el archivo por defecto que se servirá cuando se solicite un directorio
    index index.html;

    # Bloque principal de ubicación para manejar todas las solicitudes entrantes
    location / {
        # Si el archivo solicitado existe, servirlo; de lo contrario, servir index.html
        # Esto es crucial para aplicaciones de una sola página (SPAs) que usan enrutamiento del lado del cliente
        try_files $uri /index.html;
    }

    # Manejar errores 404 sirviendo index.html
    # Esto asegura que los enlaces profundos en SPAs carguen la aplicación correctamente
    error_page 404 /index.html;
}
